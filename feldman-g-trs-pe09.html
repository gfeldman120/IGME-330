<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<title>Canvas Transforms Starter</title>
	<style>
	canvas{
		border:1px solid gray;
	}
	</style>
</head>
<body>
	<canvas width="640" height="480">
		Get a real browser!
	</canvas>
	<script>
		'use strict';

        const drawTriangle = (ctx, x, y, size, rotation, strokeStyle, scale) =>
        {
            ctx.save();
			ctx.strokeStyle = strokeStyle;
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.scale(scale, scale);
			ctx.lineWidth="5";
			ctx.beginPath();
			ctx.moveTo(0, -size);
			ctx.lineTo(size, size);
			ctx.lineTo(-size, size);
			ctx.closePath();
			ctx.stroke();
            ctx.restore();
        }

        let ctx = document.querySelector('canvas').getContext('2d');
		let rotation = 0;

        // Creating object for animation
        let animatedRect = {
            x: 200,
            minX: 100,
            maxX: 300,
            xDirection: 1,
            xStep: 5,
            scale: 1,
            minScale: 0.35,
            maxScale: 2,
            scaleDirection: 1,
            scaleStep: 0.02
        }

		loop();
	
		function loop(){
            requestAnimationFrame(loop);
            rotation += .05;
			// background
			ctx.fillStyle = 'yellow'; 
			ctx.fillRect(0,0,640,480); 
	
			// draw a "better" triangle - why is this better? You'll see!
            ctx.save();
			ctx.strokeStyle="red";
            ctx.translate(500,100);
            ctx.rotate(rotation);
            ctx.scale(1.2,1.2);
            ctx.strokeStyle="red";
			ctx.fillStyle="red";
			ctx.lineWidth="5";
			ctx.beginPath();
			ctx.moveTo(0,-50);
			ctx.lineTo(50,50);
			ctx.lineTo(-50,50);
			ctx.closePath();
			ctx.stroke();
            ctx.restore();

            // ADDED CODE
            // Drawing another triangle with my function
            drawTriangle(ctx, 300, 300, 100, rotation / 3, "green", 1);
            // Drawing a scaling rectangle
            animatedRect.x += animatedRect.xStep * animatedRect.xDirection;
            if (animatedRect.x >= animatedRect.maxX || animatedRect.x <= animatedRect.minX)
            {
                animatedRect.xDirection *= -1;
            }
            animatedRect.scale += animatedRect.scaleStep * animatedRect.scaleDirection;
            if (animatedRect.scale >= animatedRect.maxScale || animatedRect.scale <= animatedRect.minScale)
            {
                animatedRect.scaleDirection *= -1;
            }
            drawSquare2(ctx, animatedRect.x, 300, 100, 50, rotation, "red", animatedRect.scale);

            drawSquare2(ctx, 200, 100, 100, 100, rotation, "purple", 0.75);
            drawSquare2(ctx, 350, 100, 100, 100, -rotation, "purple", 0.5);
            drawSquare2(ctx, 500, 300, 100, 100, rotation, "purple", 1.25);

			// do some transformations?
            ctx.save();
			ctx.translate(100,0);
			ctx.rotate(rotation);
			// ctx.scale(1.2,1.2);
			
			// set a bunch of state attributes
			ctx.shadowOffsetX = 15;
			ctx.shadowOffsetY = 15;
			ctx.shadowColor = "rgba(153,50,204,.6)";
			ctx.shadowBlur = 5;
		
			// // draw square with fillRect() convenience method
			// ctx.fillStyle="green";
			// ctx.fillRect(100,100,100,100);
            // ctx.restore();
		
			// // draw square with rect()
			// ctx.fillStyle="blue";
			// ctx.beginPath();
			// ctx.rect(300,100,100,100);
			// ctx.closePath();
			// ctx.fill();
			
			// draw squares with our helper function
			drawSquare1(ctx,100,0,100,100,"orange");
			drawSquare1(ctx,250,0,100,100,"orange");
			drawSquare1(ctx,400,0,100,100,"orange");
		
			// draw a triangle
			ctx.strokeStyle="red";
			ctx.fillStyle="red";
			ctx.lineWidth="5";
			ctx.beginPath();
			ctx.moveTo(500,100);
			ctx.lineTo(550,200);
			ctx.lineTo(450,200);
			ctx.closePath();
			ctx.stroke();

            ctx.restore();
		}
		
        // :-(
		function drawSquare1(ctx,x,y,width,height,fillStyle){
			ctx.save();
			ctx.fillStyle=fillStyle;
			ctx.fillRect(x,y,width,height);
			ctx.restore();
		}

        // :-0
        function drawSquare2(ctx,x,y,width,height,rotation,fillStyle,scale){
			ctx.save();
			ctx.fillStyle=fillStyle;
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.scale(scale, scale);
			ctx.fillRect(0-width/2, 0-height/2, width, height);
			ctx.restore();
		}
	</script>
</body>
</html>

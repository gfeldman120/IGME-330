<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Screen Saver 2</title>
    <style>
        canvas {
            border: 1px solid gray;
        }

        body {
            font-family: sans-serif;
        }

        button {
            font-size: 1.2em;
        }

        section {
            margin: .5em 0 .5em 0;
        }
    </style>
    <script>
        "use strict";

        let paused = false;
        let createRectangles = true;

        let canvas;
        let ctx;

        window.onload = init;

        function init() {
            canvas = document.querySelector("canvas");
            ctx = canvas.getContext("2d");
            setupUI();
            ctx.save();
            ctx.fillStyle = `black`;
            ctx.fillRect(0, 0, 800, 800);
            ctx.restore();
            update();
        }

        // handy helper functions!
        function getRandomColor(a) {
            function getByte() {
                return 55 + Math.round(Math.random() * 200);
            }
            return "rgba(" + getByte() + "," + getByte() + "," + getByte() + `,${a})`;
        }

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        const drawRandomRect = (a) => {
            let x = getRandomInt(-99, 800);
            let y = getRandomInt(-99, 800);
            let width = getRandomInt(0, 100);
            if (x + width > 800) {
                width = 800 - x;
            }
            else if (x + width < 0) {
                width = 100;
            }
            let height = getRandomInt(0, 100);
            if (y + height > 800) {
                height = 800 - y;
            }
            else if (y + height < 0) {
                height = 100;
            }
            let color = getRandomColor(a);
            let lineWidth = getRandomInt(0, 20);
            drawRectangle(ctx, x, y, width, height, color, lineWidth, color);
        }

        const drawRandomLine = (a) => {
            ctx.save();
            let x1 = getRandomInt(0, 800);
            let y1 = getRandomInt(0, 800);
            let x2 = getRandomInt(0, 800);
            let y2 = getRandomInt(0, 800);
            let width = getRandomInt(1, 20);
            ctx.strokeStyle = getRandomColor(a);
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.closePath();
            ctx.restore();
        }

        const drawRandomCircle = (a) => {
            ctx.save();
            let x = getRandomInt(0, 800);
            let y = getRandomInt(-99, 800);
            let radius = getRandomInt(0, 100);
            let width = getRandomInt(1, 20);
            ctx.fillStyle = getRandomColor(a);
            ctx.strokeStyle = getRandomColor(a);
            ctx.lineWidth = width;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2, false);
            switch (getRandomInt(0, 2)) {
                case 0:
                    ctx.stroke();
                    break;
                case 1:
                    ctx.fill();
                    break;
                case 2:
                    ctx.fill();
                    ctx.stroke();
                    break;
            }
            ctx.closePath();
            ctx.restore();
        }

        function canvasClicked(e) {
            let rect = e.target.getBoundingClientRect();
            let mouseX = e.clientX - rect.x;
            let mouseY = e.clientY - rect.y;
            console.log(mouseX, mouseY);
            for (let i = 0; i < 10; i++) {
                drawRectangle(
                    ctx,
                    mouseX + getRandomInt(-25, 25),
                    mouseY + getRandomInt(-25, 25),
                    getRandomInt(10, 50),
                    getRandomInt(10, 50),
                    getRandomColor(1),
                    getRandomInt(1, 10),
                    getRandomColor(1)
                );
            }
        }

        const setupUI = () => {
            let play = document.querySelector(`#btnPlay`);
            let pause = document.querySelector(`#btnPause`);
            let rectangleBox = document.querySelector(`#cbRectangles`);
            play.addEventListener(`click`, () => {
                if (paused) {
                    paused = false;
                    update();
                }
            });
            pause.addEventListener(`click`, () => {
                paused = true;
            })
            canvas.addEventListener(`click`, canvasClicked);
            rectangleBox.addEventListener(`click`, () => {
                createRectangles = rectangleBox.checked;
            });
            createRectangles = rectangleBox.checked;
        }

        const drawRectangle = (ctx, x, y, w, h, fillColor = "black", lineWidth = 0, strokeColor = "black") => {
            ctx.save();
            ctx.fillStyle = fillColor;
            ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = strokeColor;
            ctx.lineWidth = lineWidth;
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.stroke();
            ctx.closePath();
            ctx.restore();
        }

        const update = () => {
            if (paused) {
                return;
            }
            let a = getRandomInt(1, 10) / 50.0;
            let choice = getRandomInt(0, 2);
            if (choice == 0 && createRectangles) {
                drawRandomRect(a);
            }
            else if (choice == 1) {
                drawRandomLine(a);
            }
            else {
                drawRandomCircle(a);
            }
            requestAnimationFrame(update);
        }

    </script>
</head>

<body>
    <canvas width="800" height="800">
        Get a real browser!
    </canvas>
    <section>
        <button id="btnPlay">Play</button>
        <button id="btnPause">Pause</button>
    </section>
    <section>
        <span>
            <input type="checkbox" id="cbRectangles" checked>
            <label for="cbRectangles">Rectangles</label>
        </span>
    </section>
    <section>
        <p>Click on the screen to "spraypaint" rectangles (you probably want the screensaver to be paused)</p>
    </section>
</body>

</html>
